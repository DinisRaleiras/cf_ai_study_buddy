<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>CS Study Buddy</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			max-width: 850px;
			margin: 40px auto;
			padding: 0 16px;
			color: #222;
		}

		h1 {
			margin-bottom: 6px;
		}

		p {
			margin-top: 0;
			color: #555;
		}

		.top-bar {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 12px;
			margin-bottom: 12px;
		}

		#messages {
			border: 1px solid #ccc;
			border-radius: 10px;
			padding: 16px;
			min-height: 340px;
			margin-bottom: 16px;
			overflow-y: auto;
			background: #fafafa;
		}

		.msg {
			margin-bottom: 14px;
			line-height: 1.45;
			white-space: pre-wrap;
		}

		.label {
			font-weight: bold;
			margin-right: 6px;
		}

		.user-label {
			color: #111;
		}

		.assistant-label {
			color: #333;
		}

		.thinking {
			color: #777;
			font-style: italic;
		}

		form {
			display: flex;
			gap: 8px;
		}

		input {
			flex: 1;
			padding: 12px;
			font-size: 16px;
			border: 1px solid #bbb;
			border-radius: 8px;
		}

		button {
			padding: 12px 16px;
			font-size: 15px;
			cursor: pointer;
			border: 1px solid #bbb;
			border-radius: 8px;
			background: white;
		}

		button:disabled,
		input:disabled {
			opacity: 0.6;
			cursor: not-allowed;
		}
	</style>
</head>

<body>
	<div class="top-bar">
		<div>
			<h1>CS Study Buddy</h1>
			<p>A simple AI study assistant built on Cloudflare.</p>
		</div>
		<button id="clear-btn" type="button">Clear chat</button>
	</div>

	<div id="messages"></div>

	<form id="chat-form">
		<input id="message-input" type="text" placeholder="Ask something..." required />
		<button id="send-btn" type="submit">Send</button>
	</form>

	<script>
		const form = document.getElementById("chat-form");
		const input = document.getElementById("message-input");
		const messages = document.getElementById("messages");
		const clearBtn = document.getElementById("clear-btn");
		const sendBtn = document.getElementById("send-btn");

		let sessionId = crypto.randomUUID();
		let isLoading = false;
		let thinkingNode = null;

		function addMessage(role, text) {
			const div = document.createElement("div");
			div.className = "msg";

			const labelClass =
				role === "user" ? "user-label" : "assistant-label";

			div.innerHTML = `
        <span class="label ${labelClass}">${role}:</span>
        <span>${escapeHtml(text)}</span>
      `;

			messages.appendChild(div);
			messages.scrollTop = messages.scrollHeight;
		}

		function addThinking() {
			thinkingNode = document.createElement("div");
			thinkingNode.className = "msg thinking";
			thinkingNode.textContent = "assistant: Thinking...";
			messages.appendChild(thinkingNode);
			messages.scrollTop = messages.scrollHeight;
		}

		function removeThinking() {
			if (thinkingNode) {
				thinkingNode.remove();
				thinkingNode = null;
			}
		}

		function setLoading(loading) {
			isLoading = loading;
			input.disabled = loading;
			sendBtn.disabled = loading;
			clearBtn.disabled = loading;
		}

		function clearChat() {
			messages.innerHTML = "";
			sessionId = crypto.randomUUID();
			removeThinking();
		}

		function escapeHtml(text) {
			const div = document.createElement("div");
			div.textContent = text;
			return div.innerHTML;
		}

		form.addEventListener("submit", async (e) => {
			e.preventDefault();

			if (isLoading) return;

			const message = input.value.trim();
			if (!message) return;

			addMessage("user", message);
			input.value = "";
			setLoading(true);
			addThinking();

			try {
				const res = await fetch("/api/chat", {
					method: "POST",
					headers: {
						"Content-Type": "application/json"
					},
					body: JSON.stringify({ sessionId, message })
				});

				const data = await res.json();
				removeThinking();
				addMessage("assistant", data.response || "No response");
			} catch (error) {
				removeThinking();
				addMessage("assistant", "Something went wrong.");
			} finally {
				setLoading(false);
				input.focus();
			}
		});

		clearBtn.addEventListener("click", () => {
			clearChat();
			input.focus();
		});

		input.focus();
	</script>
</body>

</html>
